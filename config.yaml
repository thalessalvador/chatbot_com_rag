llm:
  provider: ollama
  google_model: gemini-2.5-flash
  google_temperature: 0.0
  ollama_model: ministral-3:8b
  ollama_base_url: http://localhost:11434
  ollama_temperature: 0.0
  ollama_num_ctx: 3072
  # Máx. tokens por geração; valores altos (ex. 2048) + 2ª passagem (citações) = muitos minutos.
  ollama_num_predict: 2048
  ollama_num_gpu: 9999
  ollama_num_thread: 0
  ollama_keep_alive: 30m
  # Segundos por pedido ao servidor Ollama (httpx); evita espera indefinida se travar. 0 = sem limite explícito.
  ollama_client_timeout_seconds: 600

embeddings:
  # Modelo de embeddings usado na indexacao Dense e nas consultas semanticas.
  # Alterar este valor exige reexecutar `--step index` para regenerar o ChromaDB.
  # Para MiniLM use sempre o id completo (igual ao `run_recall_at_k_values.py` / recall_por_k.json):
  #   sentence-transformers/all-MiniLM-L6-v2
  model: stjiris/bert-large-portuguese-cased-legal-tsdae
  #model: sentence-transformers/all-MiniLM-L6-v2
  device: cpu
  batch_size: 64

retrieval:
  top_k: 5
  rrf_k: 60
  chroma_add_batch_size: 512
  reranking:
    # Quando ativado, aplica um reranker apenas no modo hybrid.
    # O fluxo fica assim: dense + sparse -> RRF -> reranker -> top_k final.
    # `candidate_pool_size` define quantos candidatos da fusao RRF vao para o reranker.
    # Em geral, valores entre 10 e 30 sao um bom ponto de partida.
    enabled: false
    model: BAAI/bge-reranker-v2-m3
    device: cuda
    candidate_pool_size: 20

evaluation:
  golden_file: Golden_Set_Preenchido_pelo_RAG_Reranked.xlsx
  recall_k: 5

scraping:
  base_url: https://appasp.economia.go.gov.br/pareceres/
  max_docs: 9999
  timeout_seconds: 30
  user_agent: chatbot-rag-scraper/1.0
  delay_min_seconds: 0
  delay_max_seconds: 1
  clean_raw_on_start: true

transform:
  clean_output_on_start: true
  normalize_legal_headings: true
  # Comando ou caminho absoluto do LibreOffice (necessário para .doc/.xls/.ppt legados).
  # Linux/macOS: em geral "soffice" (se estiver no PATH).
  # Windows: use o caminho completo se não estiver no PATH, por exemplo:
  libreoffice_cmd: "C:/Program Files/LibreOffice/program/soffice.exe"
  # Windows: pode adicionar à variavel de ambiente PATH (Path) o caminho absoluto do LibreOffice.
  #libreoffice_cmd: soffice

legal_chunking:
  max_tokens: 700
  overlap_tokens: 140

logging:
  level: INFO
  file: logs/app.log
  max_bytes: 5242880
  backup_count: 5

ui:
  show_progress: true

rag:
  no_context_response: "Não encontrei informações na base de conhecimento para responder a esta pergunta."
